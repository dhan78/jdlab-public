name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Enables the manual run button in the UI

# Grant permissions required to publish to GitHub Packages
permissions:
  contents: read
  packages: write

jobs:
  # 1. CI Job: Lint, Build, and Validate the Next.js app locally
  validate-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 11  # Matches your project's true pnpm v11 setup

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'pnpm'

    - name: Install Dependencies
      run: pnpm install --frozen-lockfile

    - name: Build Next.js Application
      run: pnpm build
      env:
        # Pulls the secret from your GitHub Repository Settings for local verification
        PORTAL_JWT_SECRET: ${{ secrets.PORTAL_JWT_SECRET }}


  # 2. CD Job: Build Docker Image and Publish to GitHub Container Registry (GHCR)
  build-and-push-docker:
    needs: validate-and-test
    runs-on: ubuntu-latest
    # FIX: Allows the job to run on direct pushes OR manual workflow dispatches on the main branch
    if: |
      github.ref == 'refs/heads/main' && 
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }} # Automatically provided by GitHub Actions

    - name: Extract Metadata for Docker (Tags/Labels)
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.repository }}
        tags: |
          type=raw,value=latest
          type=sha,format=short

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        # Securely injects your real secret into your multi-stage Dockerfile ARG step
        build-args: |
          PORTAL_JWT_SECRET=${{ secrets.PORTAL_JWT_SECRET }}
