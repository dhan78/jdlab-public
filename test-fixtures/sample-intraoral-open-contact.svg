<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#2a0f12"/>
  <text x="24" y="40" fill="#ffe8e8" font-family="Segoe UI, Arial" font-size="22" font-weight="700">INTRAORAL — Bridge #19–21, contact #20 mesial</text>
  <text x="24" y="68" fill="#e6b3b3" font-family="Segoe UI, Arial" font-size="16">Open contact — patient can floss straight through</text>

  <!-- gum -->
  <rect x="80" y="380" width="640" height="160" rx="20" fill="#b0454e"/>

  <!-- three crowns -->
  <g fill="#efe9dc" stroke="#c9c1ae" stroke-width="2">
    <rect x="160" y="230" width="150" height="180" rx="24"/>
    <rect x="330" y="230" width="150" height="180" rx="24"/>
    <rect x="500" y="230" width="150" height="180" rx="24"/>
  </g>
  <text x="235" y="470" fill="#ffd9d9" font-family="Segoe UI, Arial" font-size="16" text-anchor="middle">#19</text>
  <text x="405" y="470" fill="#ffd9d9" font-family="Segoe UI, Arial" font-size="16" text-anchor="middle">#20</text>
  <text x="575" y="470" fill="#ffd9d9" font-family="Segoe UI, Arial" font-size="16" text-anchor="middle">#21</text>

  <!-- open contact gap highlight between #19 and #20 -->
  <rect x="305" y="240" width="30" height="160" fill="#1a1a1a"/>
  <circle cx="320" cy="320" r="46" fill="none" stroke="#ff4d4f" stroke-width="4"/>
  <line x1="320" y1="230" x2="320" y2="410" stroke="#ff4d4f" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="320" y="205" fill="#ff6b6b" font-family="Segoe UI, Arial" font-size="15" font-weight="700" text-anchor="middle">open contact</text>

  <text x="24" y="576" fill="#7a5f60" font-family="Segoe UI, Arial" font-size="13">SYNTHETIC TEST FIXTURE — not a real patient image</text>
</svg>
