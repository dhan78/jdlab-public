<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#000000"/>
  <text x="24" y="40" fill="#e8e8e8" font-family="Segoe UI, Arial" font-size="22" font-weight="700">CBCT CROSS-SECTION — R posterior maxilla</text>
  <text x="24" y="68" fill="#9aa0a6" font-family="Segoe UI, Arial" font-size="16">Low sinus floor — vertical bone at implant site</text>

  <!-- grayscale bone field -->
  <defs>
    <radialGradient id="bone" cx="50%" cy="60%" r="70%">
      <stop offset="0%" stop-color="#7d7d7d"/>
      <stop offset="70%" stop-color="#4a4a4a"/>
      <stop offset="100%" stop-color="#222"/>
    </radialGradient>
  </defs>
  <rect x="120" y="110" width="560" height="400" fill="url(#bone)"/>

  <!-- sinus cavity (dark) -->
  <path d="M300 130 Q480 120 600 200 Q560 300 420 300 Q320 280 300 130 Z" fill="#0b0b0b"/>
  <text x="470" y="200" fill="#8a8a8a" font-family="Segoe UI, Arial" font-size="15">maxillary sinus</text>

  <!-- ridge crest -->
  <path d="M260 470 Q400 430 560 470 L560 500 L260 500 Z" fill="#8f8f8f"/>

  <!-- vertical bone measurement -->
  <line x1="410" y1="310" x2="410" y2="450" stroke="#ff4d4f" stroke-width="3"/>
  <line x1="400" y1="310" x2="420" y2="310" stroke="#ff4d4f" stroke-width="3"/>
  <line x1="400" y1="450" x2="420" y2="450" stroke="#ff4d4f" stroke-width="3"/>
  <text x="428" y="390" fill="#ff6b6b" font-family="Segoe UI, Arial" font-size="18" font-weight="700">6.2 mm</text>

  <!-- proposed tilted implant -->
  <line x1="480" y1="470" x2="540" y2="300" stroke="#37d67a" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
  <text x="520" y="290" fill="#37d67a" font-family="Segoe UI, Arial" font-size="14">tilt ~30°</text>

  <text x="24" y="576" fill="#5f6368" font-family="Segoe UI, Arial" font-size="13">SYNTHETIC TEST FIXTURE — not a real patient scan</text>
</svg>
